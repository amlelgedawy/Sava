[build]
builder = "nixpacks"

[build.env]
NIXPACKS_PYTHON_VERSION = "3.10"

[deploy]
startCommand = "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/stream/activity-log"
restartPolicyType = "on_failure"
